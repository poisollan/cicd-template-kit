name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/python-flask-app/**'
      - '.github/workflows/python-ci-cd.yml'
  pull_request:
    paths:
      - 'apps/python-flask-app/**'
  workflow_dispatch:

jobs:
  test:
    name: Test Python App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/python-flask-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m py_compile app.py

  docker:
    name: Build and Push Python Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/python-flask-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/python-flask-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/python-flask-app:${{ github.sha }}
