name: EC2 Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Choose app to deploy"
        required: true
        default: "node-app"
        type: choice
        options:
          - node-app
          - python-flask-app
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set deploy variables
        run: |
          if [[ "${{ github.event.inputs.app_name }}" == "python-flask-app" ]]; then
            echo "APP_NAME=python-flask-app" >> $GITHUB_ENV
            echo "APP_PORT=5000" >> $GITHUB_ENV
          else
            echo "APP_NAME=node-app" >> $GITHUB_ENV
            echo "APP_PORT=3000" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy selected app to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            docker run -d --name ${{ env.APP_NAME }} -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            sleep 5
            curl -f http://localhost:${{ env.APP_PORT }}/health
