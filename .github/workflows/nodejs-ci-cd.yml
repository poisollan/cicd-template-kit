name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/node-app/**'
      - '.github/workflows/nodejs-ci-cd.yml'
  pull_request:
    paths:
      - 'apps/node-app/**'
  workflow_dispatch:

jobs:
  test:
    name: Test Node.js App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/node-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker:
    name: Build and Push Node.js Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Node.js image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/node-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/node-app:${{ github.sha }}
